<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>储能设备动态数据监控</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/echarts-liquidfill@3.1.0/dist/echarts-liquidfill.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Microsoft YaHei;background:#0c1a3d;color:#fff;padding:20px}
.container{max-width:1400px;margin:0 auto}
.title{text-align:center;font-size:26px;margin-bottom:20px;color:#00e4ff}
.time-box{text-align:center;font-size:20px;margin-bottom:25px;color:#fff;background:rgba(255,255,255,0.1);padding:10px;border-radius:10px}
.chart-wrap{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:20px}
.chart-item{background:rgba(255,255,255,0.05);border-radius:12px;padding:15px;border:1px solid rgba(0,228,255,0.2)}
.chart-title{text-align:center;margin-bottom:10px;font-size:16px;color:#00e4ff}
.chart{width:100%;height:280px}
.full-row{grid-column:1/4}
</style>
</head>
<body>
<div class="container">
    <div class="title">储能设备动态数据可视化监控</div>
    <div class="time-box" id="timeLabel">当前时间：8:00</div>
    <div class="chart-wrap">
        <div class="chart-item">
            <div class="chart-title">储能SOC (%)</div>
            <div class="chart" id="chart1"></div>
        </div>
        <div class="chart-item">
            <div class="chart-title">电池温度 (℃)</div>
            <div class="chart" id="chart2"></div>
        </div>
        <div class="chart-item">
            <div class="chart-title">CO₂浓度 (ppm)</div>
            <div class="chart" id="chart3"></div>
        </div>
        <div class="chart-item">
            <div class="chart-title">新风量 (m³/h)</div>
            <div class="chart" id="chart4"></div>
        </div>
        <div class="chart-item">
            <div class="chart-title">排风量 (m³/h)</div>
            <div class="chart" id="chart5"></div>
        </div>
        <div class="chart-item full-row">
            <div class="chart-title">新风/排风趋势对比</div>
            <div class="chart" id="chart6"></div>
        </div>
    </div>
</div>

<script>
const timeList = ["8:00","10:00","12:00","14:00","16:00","18:00","20:00","22:00"];
const socData =      [25,45,80,65,40,25,35,50];
const tempData =     [22.5,24,28.5,32,30.5,27,24.5,23];
const freshAirData = [2500,3000,2000,1500,2000,3000,2000,0];
const exhaustData =  [2200,2800,1800,1300,1800,2800,1500,0];
const co2Data =      [580,850,1250,720,1100,1350,650,550];

let index = 0;
const dom1 = document.getElementById('chart1');
const dom2 = document.getElementById('chart2');
const dom3 = document.getElementById('chart3');
const dom4 = document.getElementById('chart4');
const dom5 = document.getElementById('chart5');
const dom6 = document.getElementById('chart6');

const chart1 = echarts.init(dom1);
const chart2 = echarts.init(dom2);
const chart3 = echarts.init(dom3);
const chart4 = echarts.init(dom4);
const chart5 = echarts.init(dom5);
const chart6 = echarts.init(dom6);

function update(){
    document.getElementById('timeLabel').innerText = "当前时间："+timeList[index];
    let s = socData[index];
    let t = tempData[index];
    let f = freshAirData[index];
    let e = exhaustData[index];
    let c = co2Data[index];

    chart1.setOption({
        series:[{type:'gauge',radius:'80%',min:0,max:100,
            detail:{formatter:'{value}%',fontSize:26,color:'#00e4ff'},
            axisLine:{lineStyle:{width:15,color:[[s/100,'#00e4ff'],[1,'#333']]}},
            data:[{value:s}]}]
    });

    chart2.setOption({
        series:[{type:'gauge',radius:'80%',min:0,max:40,
            detail:{formatter:'{value}℃',fontSize:26,color:'#ff6b6b'},
            axisLine:{lineStyle:{width:15,color:[[t/40,'#ff6b6b'],[1,'#333']]}},
            data:[{value:t}]}]
    });

    chart3.setOption({
        series:[{type:'liquidFill',radius:'75%',data:[c/1500],
            color:['#36d399'],label:{formatter:c+' ppm',fontSize:22,color:'#fff'}}]
    });

    chart4.setOption({
        xAxis:{type:'category',data:[timeList[index]],axisLabel:{color:'#fff'}},
        yAxis:{type:'value',max:3500,axisLabel:{color:'#fff'}},
        series:[{data:[f],type:'bar',itemStyle:{color:'#00e4ff'}}]
    });

    chart5.setOption({
        xAxis:{type:'category',data:[timeList[index]],axisLabel:{color:'#fff'}},
        yAxis:{type:'value',max:3500,axisLabel:{color:'#fff'}},
        series:[{data:[e],type:'bar',itemStyle:{color:'#ffbc34'}}]
    });

    chart6.setOption({
        tooltip:{trigger:'axis'},
        legend:{data:['新风量','排风量'],textStyle:{color:'#fff'}},
        xAxis:{data:timeList,axisLabel:{color:'#fff'}},
        yAxis:{axisLabel:{color:'#fff'}},
        series:[
            {name:'新风量',type:'line',smooth:true,data:freshAirData,itemStyle:{color:'#00e4ff'}},
            {name:'排风量',type:'line',smooth:true,data:exhaustData,itemStyle:{color:'#ffbc34'}}
        ]
    });

    index = (index+1)%8;
}

update();
setInterval(update,5000);
window.addEventListener('resize',()=>{
    chart1.resize();chart2.resize();chart3.resize();
    chart4.resize();chart5.resize();chart6.resize();
});
</script>
</body>
</html>
